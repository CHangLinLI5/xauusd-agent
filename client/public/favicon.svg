<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1610"/>
      <stop offset="100%" stop-color="#28221a"/>
    </linearGradient>
    <linearGradient id="topFace" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ffe480"/>
      <stop offset="40%" stop-color="#f5d050"/>
      <stop offset="100%" stop-color="#dab030"/>
    </linearGradient>
    <linearGradient id="frontFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0b030"/>
      <stop offset="100%" stop-color="#a07818"/>
    </linearGradient>
    <linearGradient id="sideFace" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#c09020"/>
      <stop offset="100%" stop-color="#886010"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d060"/>
      <stop offset="100%" stop-color="#ffe080"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle radial glow behind the bar -->
  <circle cx="16" cy="14" r="10" fill="#f0c040" opacity="0.04"/>
  <!-- 3D Gold Bar - centered, large, solid fill -->
  <!-- Top face (trapezoid) -->
  <polygon points="9,12.5 14.5,9 23,12.5 17.5,16" fill="url(#topFace)"/>
  <!-- Front face -->
  <polygon points="9,12.5 17.5,16 17.5,21 9,17.5" fill="url(#frontFace)"/>
  <!-- Right side face -->
  <polygon points="17.5,16 23,12.5 23,17.5 17.5,21" fill="url(#sideFace)"/>
  <!-- Top edge highlight -->
  <line x1="9" y1="12.5" x2="14.5" y2="9" stroke="#ffe888" stroke-width="0.5" opacity="0.5"/>
  <line x1="14.5" y1="9" x2="23" y2="12.5" stroke="#ffe888" stroke-width="0.5" opacity="0.35"/>
  <!-- Front edge highlight -->
  <line x1="9" y1="12.5" x2="17.5" y2="16" stroke="#ffe888" stroke-width="0.4" opacity="0.3"/>
  <!-- Trend line below the bar -->
  <path d="M7 26 L12.5 22 L16 24 L25 19" stroke="url(#glow)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow head (filled triangle) -->
  <polygon points="25,19 22,19.5 23.5,22" fill="url(#glow)"/>
</svg>
