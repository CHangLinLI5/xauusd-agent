services:
  - type: web
    name: xauusd-agent
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.13.0
      - key: JWT_SECRET
        generateValue: true
      - key: CUSTOM_LLM_API_URL
        sync: false
      - key: CUSTOM_LLM_API_KEY
        sync: false
      - key: CUSTOM_LLM_MODEL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
